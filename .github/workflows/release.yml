name: Release Skill

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.0.2)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Bump version in all files
        id: versioning
        run: |
          VERSION="${{ github.event.inputs.version }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Update version.txt
          echo "$VERSION" > version.txt

          # Update version in README.md and SKILL.md titles: (v1.0.1) → (v1.0.2)
          sed -i "s/(v[0-9]*\.[0-9]*\.[0-9]*)/(v$VERSION)/g" README.md
          sed -i "s/(v[0-9]*\.[0-9]*\.[0-9]*)/(v$VERSION)/g" SKILL.md

          # Update version in install scripts (plugin.json version field)
          sed -i "s/\"version\": \"[0-9]*\.[0-9]*\.[0-9]*\"/\"version\": \"$VERSION\"/g" install-antigravity.sh

          # Commit and push
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --cached --quiet || git commit -m "chore: bump version to v$VERSION [skip ci]"
          git push

      - name: Package Skill
        run: |
          zip -r prompt-optimizer.skill . -x "*.git*" ".github*" "prompt-optimizer.skill"

      - name: Create Git Tag
        run: |
          VERSION="${{ github.event.inputs.version }}"
          git tag "v$VERSION"
          git push origin "v$VERSION"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Release v${{ github.event.inputs.version }}
          files: prompt-optimizer.skill
          body: |
            ## 🚀 Install in one line

            | Platform | Command |
            |----------|---------|
            | **Gemini CLI** | `curl -sSL https://raw.githubusercontent.com/RomainKH/prompt-optimizer/main/install.sh \| bash` |
            | **Antigravity IDE** | `curl -sSL https://raw.githubusercontent.com/RomainKH/prompt-optimizer/main/install-antigravity.sh \| bash` |
            | **Claude Code** | `curl -sSL https://raw.githubusercontent.com/RomainKH/prompt-optimizer/main/install-claude.sh \| bash` |
            | **Cursor** | `curl -sSL https://raw.githubusercontent.com/RomainKH/prompt-optimizer/main/install-cursor.sh \| bash` |
            | **GitHub Copilot** | `curl -sSL https://raw.githubusercontent.com/RomainKH/prompt-optimizer/main/install-copilot.sh \| bash` |
            | **Windsurf** | `curl -sSL https://raw.githubusercontent.com/RomainKH/prompt-optimizer/main/install-windsurf.sh \| bash` |
            | **ChatGPT** | `curl -sSL https://raw.githubusercontent.com/RomainKH/prompt-optimizer/main/install-chatgpt.sh \| bash` |

            See the [README](https://github.com/RomainKH/prompt-optimizer#readme) for full setup instructions.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
